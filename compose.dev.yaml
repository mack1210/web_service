# Development overlay: only application development ports are published locally.
services:
  api:
    build:
      target: dev
    command:
      - uv
      - run
      - --no-sync
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    environment:
      APP_ENV: development
    volumes:
      - ./backend/app:/app/app
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      target: dev
      args:
        NEXT_API_ORIGIN: http://api:8000
        NEXT_PUBLIC_DATA_SOURCE: mock
    command:
      - pnpm
      - dev
      - --hostname
      - 0.0.0.0
      - --port
      - "3000"
    environment:
      NODE_ENV: development
      NEXT_API_ORIGIN: http://api:8000
      NEXT_PUBLIC_DATA_SOURCE: mock
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  frontend_node_modules:
