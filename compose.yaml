name: ${COMPOSE_PROJECT_NAME:-overnight-web-agent-kit}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    environment:
      APP_ENV: production
      APP_NAME: overnight-web-agent-kit-api
    restart: unless-stopped
    init: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_API_ORIGIN: ${NEXT_API_ORIGIN:-http://api:8000}
        NEXT_PUBLIC_DATA_SOURCE: ${NEXT_PUBLIC_DATA_SOURCE:-http}
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      INTERNAL_API_ORIGIN: http://api:8000
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - app_net

  caddy:
    image: caddy:2.10-alpine
    profiles:
      - production
    ports:
      # Keep the origin private by default. The Cloudflare Tunnel profile reaches
      # this service on the internal Docker network, so an internet-facing host
      # port is neither required nor desirable.
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-18080}:18080"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    init: true
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null http://127.0.0.1:18080/health/ready || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
